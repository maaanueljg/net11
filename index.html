<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Net11 · Fantasy Fútbol</title>

  <!-- PWA Meta -->
  <meta name="theme-color" content="#00e676" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Net11" />
  <meta name="description" content="Net11 - El mejor fantasy de fútbol. LaLiga, Premier y Champions." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── RESET & VARS ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:    #00e676;
      --accent2:   #00b0ff;
      --danger:    #ff1744;
      --gold:      #ffd600;
      --bg:        #080c10;
      --bg2:       #0d1117;
      --bg3:       #141c24;
      --bg4:       #1c2733;
      --border:    rgba(255,255,255,0.07);
      --text:      #e8edf2;
      --muted:     #5a6a7a;
      --por:       #ffd600;
      --def:       #00b0ff;
      --med:       #00e676;
      --del:       #ff1744;
      --font-head: 'Anton', sans-serif;
      --font-body: 'Outfit', sans-serif;
      --r:         14px;
      --r-sm:      8px;
    }
    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── LAYOUT ───────────────────────────────────────────── */
    #app {
      display: flex; flex-direction: column;
      height: 100dvh; max-width: 480px;
      margin: 0 auto; position: relative;
      overflow: hidden;
    }

    /* ── HEADER ───────────────────────────────────────────── */
    header {
      flex-shrink: 0;
      background: linear-gradient(160deg, #0d1a10 0%, #0a141e 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px 12px;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 80% 0%, rgba(0,230,118,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .header-row {
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .logo {
      font-family: var(--font-head);
      font-size: 32px; letter-spacing: 2px; line-height: 1;
      color: #fff;
    }
    .logo span { color: var(--accent); }
    .logo sub {
      font-family: var(--font-body);
      font-size: 10px; font-weight: 500;
      color: var(--muted); letter-spacing: 3px;
      display: block; margin-top: 2px;
      text-transform: uppercase;
    }
    .budget-pill {
      text-align: right;
    }
    .budget-pill .label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .budget-pill .amount {
      font-family: var(--font-head); font-size: 18px; line-height: 1;
      transition: color 0.3s;
    }
    .budget-pill .amount.low { color: var(--danger); }
    .budget-pill .amount.ok  { color: var(--gold); }

    .header-stats {
      display: flex; gap: 8px; margin-top: 12px;
    }
    .stat-chip {
      flex: 1; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 7px 8px; text-align: center;
    }
    .stat-chip .val { font-weight: 700; font-size: 15px; color: #fff; }
    .stat-chip .key { font-size: 9px; color: var(--muted); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── SCROLL CONTENT ───────────────────────────────────── */
    #content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 72px;
    }
    #content::-webkit-scrollbar { display: none; }

    /* ── BOTTOM NAV ───────────────────────────────────────── */
    nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(8,12,16,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 6px 0 max(10px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer;
      padding: 4px 0; color: var(--muted);
      transition: color 0.2s;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn .nav-icon { font-size: 22px; line-height: 1; }
    .nav-btn .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
    .nav-btn .nav-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--accent);
      opacity: 0; transition: opacity 0.2s;
    }
    .nav-btn.active .nav-dot { opacity: 1; }

    /* ── NOTIFICATION TOAST ───────────────────────────────── */
    #toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
      padding: 10px 22px; border-radius: 30px;
      font-size: 13px; font-weight: 600;
      backdrop-filter: blur(12px);
      z-index: 999; white-space: nowrap;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { background: rgba(0,230,118,0.18); border: 1px solid rgba(0,230,118,0.4); color: var(--accent); }
    #toast.error   { background: rgba(255,23,68,0.18);  border: 1px solid rgba(255,23,68,0.4);  color: var(--danger); }
    #toast.warn    { background: rgba(255,214,0,0.15);  border: 1px solid rgba(255,214,0,0.4);  color: var(--gold); }

    /* ── SECTION TITLE ────────────────────────────────────── */
    .sec-title {
      font-family: var(--font-head); font-size: 20px; letter-spacing: 1.5px;
      color: var(--text); padding: 16px 18px 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .sec-title span { color: var(--accent); }

    /* ─────────────────────────────────────────────────────── */
    /*  TAB: EQUIPO                                            */
    /* ─────────────────────────────────────────────────────── */
    .formation-bar {
      display: flex; gap: 6px; padding: 0 18px 12px;
      overflow-x: auto; scrollbar-width: none;
    }
    .formation-bar::-webkit-scrollbar { display: none; }
    .fmbtn {
      padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--bg3); color: var(--muted);
      font-family: var(--font-body); font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all 0.2s;
    }
    .fmbtn.active {
      background: var(--accent); border-color: var(--accent);
      color: var(--bg); box-shadow: 0 0 16px rgba(0,230,118,0.35);
    }

    /* Pitch */
    .pitch-wrap {
      margin: 0 16px 16px;
      background:
        linear-gradient(180deg, #0a2a14 0%, #082010 50%, #061a0c 100%);
      border-radius: 18px;
      border: 1px solid rgba(0,230,118,0.12);
      position: relative; overflow: hidden;
      padding: 18px 10px 14px;
      box-shadow: 0 0 40px rgba(0,230,118,0.04) inset;
    }
    /* Field lines */
    .pitch-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 20% at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 100%);
      pointer-events: none;
    }
    .field-lines {
      position: absolute; inset: 0; pointer-events: none;
    }

    /* Slot */
    .slot {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      cursor: pointer;
    }
    .slot-circle {
      width: 50px; height: 50px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; transition: all 0.2s;
      position: relative;
    }
    .slot-circle.empty {
      border: 2px dashed rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.2);
      font-size: 18px;
    }
    .slot-circle.empty:hover { border-color: rgba(255,255,255,0.3); }
    .slot-circle.active-select {
      border: 2px dashed var(--accent) !important;
      background: rgba(0,230,118,0.08) !important;
      animation: pulse-slot 1s infinite;
    }
    @keyframes pulse-slot {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,230,118,0.3); }
      50%      { box-shadow: 0 0 0 6px rgba(0,230,118,0); }
    }
    .slot-circle.filled {
      border: 2px solid;
      box-shadow: 0 0 14px -2px currentColor;
    }
    .slot-name {
      font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.8);
      text-align: center; max-width: 54px; line-height: 1.2;
      letter-spacing: 0.3px;
    }
    .slot-pts {
      font-size: 9px; font-weight: 700;
    }

    /* Plantilla list */
    .plantilla { padding: 0 16px; }
    .plantilla-empty {
      text-align: center; color: var(--muted);
      padding: 28px; font-size: 13px; line-height: 1.6;
      background: var(--bg3); border-radius: var(--r);
      border: 1px dashed var(--border);
    }

    /* ─────────────────────────────────────────────────────── */
    /*  PLAYER CARD                                            */
    /* ─────────────────────────────────────────────────────── */
    .player-card {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--r); padding: 11px 13px;
      margin-bottom: 8px; transition: all 0.18s;
      position: relative; overflow: hidden;
    }
    .player-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      border-radius: 3px 0 0 3px;
    }
    .player-card.por::before { background: var(--por); }
    .player-card.def::before { background: var(--def); }
    .player-card.med::before { background: var(--med); }
    .player-card.del::before { background: var(--del); }
    .player-card.dim { opacity: 0.42; }

    .pc-emoji { font-size: 24px; }
    .pc-info { flex: 1; min-width: 0; }
    .pc-name { font-weight: 600; font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pc-team { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .pc-badge {
      font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .pc-badge.por { background: rgba(255,214,0,0.15);  color: var(--por); }
    .pc-badge.def { background: rgba(0,176,255,0.15);  color: var(--def); }
    .pc-badge.med { background: rgba(0,230,118,0.15);  color: var(--med); }
    .pc-badge.del { background: rgba(255,23,68,0.15);  color: var(--del); }
    .pc-pts { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .pc-right { text-align: right; }
    .pc-value { font-family: var(--font-head); font-size: 17px; color: var(--gold); line-height: 1; }
    .pc-btn {
      margin-top: 5px; padding: 4px 10px; border-radius: 6px;
      font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid;
      font-family: var(--font-body); transition: all 0.18s;
    }
    .pc-btn.buy  { background: rgba(0,230,118,0.12); border-color: rgba(0,230,118,0.3); color: var(--accent); }
    .pc-btn.sell { background: rgba(255,23,68,0.12);  border-color: rgba(255,23,68,0.3);  color: var(--danger); }
    .pc-btn:disabled { background: rgba(255,255,255,0.04); border-color: var(--border); color: var(--muted); cursor: not-allowed; }

    /* ─────────────────────────────────────────────────────── */
    /*  TAB: MERCADO                                           */
    /* ─────────────────────────────────────────────────────── */
    .market-filters { padding: 0 16px 10px; }
    .search-box {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font-body); font-size: 13px;
      margin-bottom: 10px; outline: none; transition: border-color 0.2s;
    }
    .search-box:focus { border-color: rgba(0,230,118,0.35); }
    .filter-row { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 8px; scrollbar-width: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      padding: 5px 13px; border-radius: 16px; border: 1px solid var(--border);
      background: var(--bg3); color: var(--muted);
      font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: all 0.18s;
    }
    .filter-chip.active-league { background: #ff1744; border-color: #ff1744; color: #fff; }
    .filter-chip.active-por    { background: var(--por); border-color: var(--por); color: var(--bg); }
    .filter-chip.active-def    { background: var(--def); border-color: var(--def); color: var(--bg); }
    .filter-chip.active-med    { background: var(--med); border-color: var(--med); color: var(--bg); }
    .filter-chip.active-del    { background: var(--del); border-color: var(--del); color: var(--bg); }
    .filter-chip.active-all    { background: var(--bg4); border-color: rgba(255,255,255,0.2); color: #fff; }

    /* ─────────────────────────────────────────────────────── */
    /*  TAB: RANKING                                           */
    /* ─────────────────────────────────────────────────────── */
    .ranking-hero {
      margin: 0 16px 14px;
      background: linear-gradient(135deg, #0d1f10, #0a1820);
      border: 1px solid rgba(0,230,118,0.15);
      border-radius: var(--r); padding: 18px;
      text-align: center; position: relative; overflow: hidden;
    }
    .ranking-hero::before {
      content: '🏆';
      position: absolute; font-size: 80px; opacity: 0.05;
      right: -10px; top: 50%; transform: translateY(-50%);
    }
    .ranking-hero .rh-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .ranking-hero .rh-pos { font-family: var(--font-head); font-size: 52px; color: var(--accent); line-height: 1; }
    .ranking-hero .rh-pts { font-size: 14px; color: var(--text); margin-top: 4px; }

    .rank-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; margin-bottom: 7px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--r); transition: all 0.2s;
    }
    .rank-item.me {
      background: linear-gradient(135deg, rgba(0,230,118,0.07), rgba(0,230,118,0.03));
      border-color: rgba(0,230,118,0.25);
    }
    .rank-num {
      font-family: var(--font-head); font-size: 22px;
      width: 28px; text-align: center; flex-shrink: 0;
    }
    .rank-info { flex: 1; }
    .rank-user { font-weight: 600; font-size: 14px; }
    .rank-user.me-label { color: var(--accent); }
    .rank-team { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .rank-pts { font-family: var(--font-head); font-size: 20px; color: var(--gold); }

    /* ─────────────────────────────────────────────────────── */
    /*  TAB: JORNADA                                           */
    /* ─────────────────────────────────────────────────────── */
    .jornada-header {
      margin: 0 16px 14px;
      background: linear-gradient(135deg, #0a1820, #0d1a10);
      border: 1px solid var(--border); border-radius: var(--r);
      padding: 16px 18px; display: flex; align-items: center; justify-content: space-between;
    }
    .jornada-header .jh-info .jh-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .jornada-header .jh-info .jh-num { font-family: var(--font-head); font-size: 28px; color: #fff; line-height: 1; }
    .jornada-header .jh-pts { text-align: right; }
    .jornada-header .jh-pts .jh-total { font-family: var(--font-head); font-size: 36px; color: var(--accent); line-height: 1; }
    .jornada-header .jh-pts .jh-sub { font-size: 10px; color: var(--muted); }
    .pts-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 13px; margin-bottom: 8px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--r);
    }
    .pts-bar .pb-emoji { font-size: 22px; }
    .pts-bar .pb-info { flex: 1; }
    .pts-bar .pb-name { font-weight: 600; font-size: 13px; }
    .pts-bar .pb-track {
      margin-top: 5px; height: 4px; background: var(--bg4);
      border-radius: 2px; overflow: hidden;
    }
    .pts-bar .pb-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .pts-bar .pb-val {
      font-family: var(--font-head); font-size: 22px;
      min-width: 36px; text-align: right;
    }

    /* ─────────────────────────────────────────────────────── */
    /*  INSTALL BANNER                                         */
    /* ─────────────────────────────────────────────────────── */
    #install-banner {
      display: none;
      position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 32px); max-width: 448px;
      background: linear-gradient(135deg, #0d2a18, #0a1e2a);
      border: 1px solid rgba(0,230,118,0.3);
      border-radius: var(--r); padding: 14px 16px;
      z-index: 90;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #install-banner.visible { display: flex; align-items: center; gap: 12px; }
    .ib-text { flex: 1; }
    .ib-text strong { display: block; font-size: 14px; color: #fff; }
    .ib-text span { font-size: 12px; color: var(--muted); }
    .ib-btn {
      padding: 8px 16px; border-radius: 8px;
      background: var(--accent); color: var(--bg);
      border: none; font-weight: 700; font-size: 13px;
      cursor: pointer; font-family: var(--font-body);
    }
    .ib-close {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 18px; padding: 0 4px;
    }

    /* ─────────────────────────────────────────────────────── */
    /*  FIREBASE SETUP MODAL                                   */
    /* ─────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px); z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.hidden { display: none; }
    .modal-sheet {
      background: var(--bg2); border-radius: 20px 20px 0 0;
      border: 1px solid var(--border); border-bottom: none;
      padding: 20px 20px max(20px, env(safe-area-inset-bottom));
      width: 100%; max-width: 480px;
      animation: slideUp 0.3s cubic-bezier(0.34,1.2,0.64,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .modal-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto 18px;
    }
    .modal-title { font-family: var(--font-head); font-size: 22px; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
    .fb-step {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 12px 14px; margin-bottom: 8px;
    }
    .fb-step .step-num {
      font-family: var(--font-head); font-size: 11px; color: var(--accent);
      letter-spacing: 1px; margin-bottom: 4px;
    }
    .fb-step .step-text { font-size: 13px; color: var(--text); line-height: 1.4; }
    .fb-step code {
      background: var(--bg); padding: 2px 6px; border-radius: 4px;
      font-size: 12px; color: var(--gold);
    }
    .modal-close {
      width: 100%; padding: 13px; border-radius: var(--r);
      background: var(--accent); color: var(--bg);
      border: none; font-weight: 700; font-size: 15px;
      cursor: pointer; font-family: var(--font-body); margin-top: 10px;
    }

    /* Loading */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn 0.35s ease forwards; }
  </style>
</head>
<body>

<div id="app">

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- HEADER -->
  <header>
    <div class="header-row">
      <div class="logo">
        NET<span>11</span>
        <sub>Fantasy Fútbol</sub>
      </div>
      <div class="budget-pill">
        <div class="label">Presupuesto</div>
        <div class="amount ok" id="budget-display">100M€</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-chip">
        <div class="val" id="stat-players">0/11</div>
        <div class="key">Jugadores</div>
      </div>
      <div class="stat-chip">
        <div class="val" id="stat-pts">0</div>
        <div class="key">Puntos</div>
      </div>
      <div class="stat-chip">
        <div class="val" id="stat-form">4-3-3</div>
        <div class="key">Formación</div>
      </div>
      <div class="stat-chip">
        <div class="val">J30</div>
        <div class="key">Jornada</div>
      </div>
    </div>
  </header>

  <!-- CONTENT -->
  <div id="content"></div>

  <!-- BOTTOM NAV -->
  <nav>
    <button class="nav-btn" data-tab="inicio" onclick="switchTab('inicio',this)">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Inicio</div>
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn active" data-tab="equipo" onclick="switchTab('equipo',this)">
      <div class="nav-icon">👕</div>
      <div class="nav-label">Equipo</div>
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-tab="mercado" onclick="switchTab('mercado',this)">
      <div class="nav-icon">💰</div>
      <div class="nav-label">Mercado</div>
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-tab="clasificacion" onclick="switchTab('clasificacion',this)">
      <div class="nav-icon">🏆</div>
      <div class="nav-label">Clasificación</div>
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-tab="perfil" onclick="switchTab('perfil',this)">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Perfil</div>
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-liga" data-tab="liga" onclick="switchTab('liga',this)" style="display:none">
      <div class="nav-icon">⚙️</div>
      <div class="nav-label">Liga</div>
      <div class="nav-dot"></div>
    </button>
  </nav>

</div>

<!-- MODAL LOGIN -->
<div class="modal-overlay hidden" id="login-modal">
  <div class="modal-sheet" style="max-height:90vh;overflow-y:auto">
    <div class="modal-handle"></div>
    <div class="modal-title">👋 Bienvenido a <span style="color:var(--accent)">Net11</span></div>
    <div class="modal-sub">Inicia sesión para guardar tu equipo y competir con amigos.</div>

    <button id="btn-google-login" style="
      width:100%;padding:13px;border-radius:var(--r);
      background:#fff;color:#1a1a1a;border:none;
      font-weight:700;font-size:15px;cursor:pointer;
      font-family:var(--font-body);display:flex;align-items:center;
      justify-content:center;gap:10px;margin-bottom:14px">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="Google">
      Continuar con Google
    </button>

    <div style="text-align:center;color:var(--muted);font-size:12px;margin-bottom:14px">— o con email —</div>

    <input id="auth-email" type="email" class="search-box" placeholder="Email" style="margin-bottom:8px">
    <input id="auth-password" type="password" class="search-box" placeholder="Contraseña" style="margin-bottom:8px">
    <div id="auth-error" style="color:var(--danger);font-size:12px;min-height:18px;margin-bottom:6px"></div>

    <div style="display:flex;gap:8px">
      <button id="btn-email-login" class="modal-close" style="flex:1;background:var(--bg4);color:var(--text)">Entrar</button>
      <button id="btn-email-register" class="modal-close" style="flex:1">Registrarse</button>
    </div>
  </div>
</div>

<!-- MODAL ONBOARDING (nombre de equipo) -->
<div class="modal-overlay hidden" id="onboarding-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">⚽ Tu equipo</div>
    <div class="modal-sub">¿Cómo se llama tu equipo? Esto aparecerá en el ranking.</div>
    <input id="onboarding-team-name" type="text" class="search-box"
      placeholder="Ej: Los Galácticos" maxlength="24" style="margin-bottom:8px">
    <div id="onboarding-error" style="color:var(--danger);font-size:12px;min-height:18px;margin-bottom:6px"></div>
    <button id="btn-onboarding-save" class="modal-close">Guardar y empezar ✓</button>
  </div>
</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
